name: Main Workflow

on: [push, pull_request, workflow_dispatch]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: ["windows-2022", "macos-13", "ubuntu-20.04"]
        python-version: ["3.9", "3.12"]
        include:
          # Test minimal versions on ubuntu only
          - os: "ubuntu-20.04"
            python-version: "3.9"
            test-minimal: true

    runs-on: ${{ matrix.os }}
    name: Test ${{ matrix.os }} / Python ${{ matrix.python-version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"
          cache: true

      # Latest versions - full testing with all extras
      - name: Install dependencies (latest)
        if: ${{ !matrix.test-minimal }}
        run: uv sync --all-extras

      # Minimal versions - test with lowest direct deps
      - name: Install dependencies (minimal)
        if: ${{ matrix.test-minimal }}
        run: uv pip install --resolution lowest-direct -e ".[full]" --system

      - name: Print environment
        run: |
          python --version
          uv --version
          uv pip list

      # Run tests
      - name: Run tests
        run: uv run pytest -rfP --cov=maxcorr --cov-report=xml
        env:
          TF_CPP_MIN_LOG_LEVEL: 2  # Suppress TensorFlow warnings
          TF_FORCE_GPU_ALLOW_GROWTH: true

      - name: Upload coverage
        if: ${{ matrix.os == 'ubuntu-20.04' && matrix.python-version == '3.12' }}
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # ================================================================
  # LINTING
  # ================================================================
  lint:
    runs-on: ubuntu-latest
    name: Lint & Format

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"
          cache: true

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Lint with Ruff
        run: uv run ruff check .

      - name: Format check with Ruff
        run: uv run ruff format --check .

  # ================================================================
  # BUILD
  # ================================================================
  build:
    runs-on: ubuntu-latest
    name: Build Package

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"

      - name: Build wheel and sdist
        run: uv build

      - name: List artifacts
        run: ls -lh dist/